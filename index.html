<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Executivo - Francisco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Barra Lateral / Header de Identificação -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Logo Concessionária" class="logo">
            </div>
            <div class="profile-info">
                <h2>Consultor Francisco</h2>
                <p class="status"><span class="status-dot"></span> Online</p>
            </div>
        </aside>

        <!-- Área Principal do Chat -->
        <main class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <!-- As mensagens do consultor e do cliente vão aparecer aqui -->
                <div class="message assistant">
                    <div class="message-text">
                        Olá! Tudo bem? Meu nome é Francisco. É um grande prazer receber você aqui hoje. Estou à disposição para te ajudar a encontrar o veículo ideal para a sua rotina e para o seu bolso. Como posso te ajudar hoje?
                    </div>
                </div>
            </div>

            <!-- Campo de Entrada de Texto -->
            <div class="chat-input-area">
                <form id="chatForm">
                    <input type="text" id="userInput" placeholder="Digite sua mensagem aqui..." autocomplete="off" required>
                    <button type="submit" id="sendBtn">Enviar</button>
                </form>
            </div>
        </main>
    </div>

<!-- Scripts do Projeto Corrigidos -->
<script src="config.js"></script>
<script src="prompt.js"></script>
<script src="script.js"></script>
</body>
</html>
